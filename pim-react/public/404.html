<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>PIM Studio</title>
    <script>
      // GitHub Pages SPA fallback: store current URL and redirect to root
      var l = window.location;
      sessionStorage.redirect = l.href;
      l.replace(l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') + l.pathname.split('/').slice(0, 2).join('/') + '/?p=/' + l.pathname.slice(1) + (l.search ? '&q=' + l.search.slice(1) : '') + l.hash);
    </script>
  </head>
  <body></body>
</html>
